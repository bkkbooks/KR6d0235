body:
  text: 山家教觀傳來久矣大小部帙典型尚在獨稱四明法師中興者其故何哉曰典型雖在而迷者異見由乎山外一宗妄生穿鑿稟承既謬見解復差致一家教觀日就陸沈矣古人所謂道若懸絲而引石是此之謂歟賴有四明法師而中興之使一家教觀大概於時人到于今咸受其賜也嘗竊疑之舉世皆謂四明中興天台教觀而不知所謂中興也未審中興之説如何説耶請試陳之或謂四明事理三千總別生身尊特此等莫非中興之説乎今謂不然應知四明中興之道非天竺慈雲法師孰能知之彼指要序云教門權實今時同昧者於茲判矣別理隨緣其類也觀道所託連代共迷者於茲見矣指要所以其立也大哉天竺之言斷可信矣是知指要鈔中立別理隨緣乃中興一家圓頓之教立陰觀妄顯一家境觀之道秪此二説乃中興教觀之主意也後人不知其要委有指陳謂能傳四明中興之道者遠矣疑曰以何義故以別理隨緣之説是中興教耶以山外一派宗天台者咸謂賢首之宗大乘終教所説隨緣正同今家圓教隨緣之義擠陷本宗圓頓之談齊彼終教況彼更有頓圓教則使今宗抗折百家超過諸説之談居彼下矣四明從明從而闢之以彼大乘終教隨緣正同今家別義又格彼頓教圓教既不談具即義不成亦是今家別義方顯今家所説圓頓談即談具超過諸説四明所謂秪一具字彌顯今宗中興其教不在茲乎所以中興觀者亦由山外之宗不曉止觀觀境之旨却以一念而為真心不立陰境四明斥云大失宗旨所以特立陰妄而為所觀顯於妙理故曰指介爾之心為事理解行之要豈非中興境觀之説乎得此意已方可與論四明中與教觀之説其如三諦事理三千總別有相無相二境三觀三身壽量播在章記從而可知寄語學者宣宗思之稟承教觀須識源流不可望風而已
